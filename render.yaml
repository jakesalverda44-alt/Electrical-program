services:
  - type: web
    name: accurate-power-crm
    env: node
    buildCommand: npm run build
    startCommand: node backend/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: accurate-power-db
          property: connectionString

databases:
  - name: accurate-power-db
    databaseName: electrical_crm
    plan: free
