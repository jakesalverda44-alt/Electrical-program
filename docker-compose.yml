version: '3.9'
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: electrical_crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DB_HOST: db
      DB_NAME: electrical_crm
      DB_USER: postgres
      DB_PASS: postgres
      # JWT_SECRET intentionally omitted for local dev — the backend uses a
      # non-production dev fallback (see backend/src/middleware/auth.ts). In
      # production it is set via the platform (render.yaml uses generateValue).
      # To override locally: JWT_SECRET: ${JWT_SECRET:-}
    ports:
      - "3001:3001"
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
