name: Migrate Data
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'verify = read-only check (writes nothing); apply = restore settings'
        type: choice
        default: verify
        options:
          - verify
          - apply
jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: cd backend && npm install
      - name: Recover settings from old database
        env:
          SOURCE_DB: ${{ secrets.SOURCE_DB }}
          TARGET_DB: ${{ secrets.TARGET_DB }}
          MODE: ${{ inputs.mode }}
        run: node backend/recover-settings.js
